<!DOCTYPE html>
<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RefPay</title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/index.css">
    </head>
    <body>
        <div class="container" id="settings">
            <div class="logo-container" id="settings">
                <img src="assets/logo.png" class="logo"></img>
            </div>
            <div class="logo-container">

            </div>
            <label for="crew">Schiedsrichter-Crew:</label>
            <select id="crew">
                <option value="3">3er Crew</option>
                <option value="4">4er Crew</option>
                <option value="5" selected>5er Crew</option>
                <option value="7">7er Crew</option>
                <option value="8">8er Crew</option>
            </select>
            <label for="scenario">Abrechnungsszenario:</label>
            <select id="scenario">
                <option value="einzelspiel" selected>1 Spiel (Ref: 70€, andere: 60€)</option>
                <option value="turnier6">Turnier (bis 6 Halbzeiten, alle 70€)</option>
                <option value="turnier6plus">Turnier (mehr als 6 Halbzeiten, alle 90€)</option>
            </select>
            <label class="checkbox-label">
                <input type="checkbox" id="jugendspiel"> Jugendspiel - Double Header (+25€ pro Person)
            </label>
            <input type="number" id="cents-per-kilometer" value="35" placeholder="Cent Pro Kilometer"></input>
            <div id="calculation-interface" class="center">
            </div>
            <div id="summary">
                <h3>Aufwandsentschädigung</h3>
                <div class="center">
                <table class="cost-table">
                    <tr>
                        <td>Referee</td>
                        <td id="referee-compensation">0.00 €</td>
                    </tr>
                    <tr>
                        <td>Schiedsrichter (Anzahl: <span id="other-count">0</span>)</td>
                        <td id="other-compensation">0.00 €</td>
                    </tr>
                    <tr>
                        <td>KFZ 1</td>
                        <td id="motor-vehicle-costs-0">0.00 €</td>
                    </tr>
                    <tr>
                        <td>KFZ 2</td>
                        <td id="motor-vehicle-costs-1">0.00 €</td>
                    </tr>
                    <tr>
                        <td>KFZ 3</td>
                        <td id="motor-vehicle-costs-2">-</td>
                    </tr>
                    <tr>
                        <td>Jugendspiel Schiedsrichter (Anzahl: <span id="total-count">0</span>)</td>
                        <td id="jugendspiel-compensation">-</td>
                    </tr>
                    <tr class="total-row">
                        <td><strong>Gesamtbetrag</strong></td>
                        <td id="total-sum">0.00 €</td>
                    </tr>
                </table>
                </div>
                <button id="copy-to-clipboard">Kopiere in Ablage</button>
                <button id="create-schiedrichterquittung">Schiedrichterquittung erstellen</button>
            </div>
            <div class="container-footer" name="imprint">
                <a href="imprint.html" id="impressum-link">Impressum</a>
                <span class="version" id="version">RefPay v0.0</span>
            </div>
        </div>
        <script src="js/clipboard.js"></script>
        <script src="js/values.js"></script>
        <script src="js/topDriverUtils.js"></script>
        <script src="js/dataUtils.js"></script>
        <script src="js/urlUtils.js"></script>
        <script src="js/insertVersion.js"></script>
        <script src="js/crewDesignations.js"></script>
        <script src="js/index.js"></script>
    </body>
</html>
