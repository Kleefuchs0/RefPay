<html lang="de">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RefPay</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <!-- Ergebnisseite -->
    <div id="ergebnisseite" class="container" style="display: none;">
        <div class="logo-container">
            <img src="logo.png" alt="RefPay Logo" class="logo">
        </div>

        <div id="ergebnis-tabelle"></div>
        <div id="ergebnis-summary">
            <h3>Aufwandsentschädigung</h3>
            <table class="kosten-tabelle">
                <tr>
                    <td>Referee</td>
                    <td id="referee-entschaedigung">0.00 €</td>
                </tr>
                <tr>
                    <td>Schiedsrichter (Anzahl: <span id="andere-sr-anzahl">0</span>)</td>
                    <td id="andere-entschaedigung">0.00 €</td>
                </tr>
                <tr>
                    <td>KFZ 1</td>
                    <td id="auto1-kosten">0.00 €</td>
                </tr>
                <tr>
                    <td>KFZ 2</td>
                    <td id="auto2-kosten">0.00 €</td>
                </tr>
                <tr>
                    <td>KFZ 3</td>
                    <td id="auto3-kosten">-</td>
                </tr>
                <tr>
                    <td>Jugendspiel</td>
                    <td></td>
                </tr>
                <tr>
                    <td>Schiedsrichter (Anzahl: <span id="gesamt-sr-anzahl">0</span>)</td>
                    <td id="jugendspiel-entschaedigung">-</td>
                </tr>
                <tr class="gesamtzeile">
                    <td><strong>Gesamtbetrag</strong></td>
                    <td id="gesamtbetrag">0.00 €</td>
                </tr>
            </table>
        </div>
        <a href="/"><button id="zurueck">Zurück</button></a>
        <script src="/js/getCrewDesignations.js"></script>
        <script src="calculate.js"></script>
        </body>
</html>
